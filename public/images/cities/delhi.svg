<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Delhi skyline at night">
  <defs>
    <linearGradient id="delhi-bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081021"/>
      <stop offset="0.5" stop-color="#122244"/>
      <stop offset="1" stop-color="#060B17"/>
    </linearGradient>
    <radialGradient id="delhi-orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 170) rotate(132) scale(300 340)">
      <stop stop-color="#6366F1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#delhi-bg)"/>
  <rect width="1400" height="900" fill="url(#delhi-orb)"/>

  <g fill="#0F1A32">
    <rect x="0" y="560" width="1400" height="340"/>
    <rect x="90" y="430" width="120" height="230"/>
    <rect x="240" y="380" width="150" height="280"/>
    <rect x="430" y="460" width="110" height="200"/>
    <rect x="580" y="320" width="160" height="340"/>
    <rect x="790" y="390" width="130" height="270"/>
    <rect x="960" y="350" width="170" height="310"/>
    <rect x="1160" y="420" width="130" height="240"/>
  </g>

  <g opacity="0.55" fill="#93C5FD">
    <rect x="110" y="455" width="10" height="10" rx="2"/>
    <rect x="140" y="455" width="10" height="10" rx="2"/>
    <rect x="260" y="410" width="10" height="10" rx="2"/>
    <rect x="290" y="410" width="10" height="10" rx="2"/>
    <rect x="620" y="350" width="10" height="10" rx="2"/>
    <rect x="650" y="350" width="10" height="10" rx="2"/>
    <rect x="990" y="384" width="10" height="10" rx="2"/>
    <rect x="1020" y="384" width="10" height="10" rx="2"/>
    <rect x="1190" y="450" width="10" height="10" rx="2"/>
  </g>

  <g fill="#E2E8F0" opacity="0.85">
    <rect x="86" y="86" width="280" height="44" rx="12"/>
